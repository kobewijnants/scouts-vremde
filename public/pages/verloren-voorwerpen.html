<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Verloren Voorwerpen - Scouts Vremde</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../js/tailwind.config.js"></script>
    <link href="../css/styles.css" rel="stylesheet" />
</head>
<body class="bg-surface text-on-surface font-body selection:bg-secondary-container selection:text-on-secondary-container">

    <div id="nav-placeholder"></div>

    <main class="pt-32 pb-20 px-4 md:px-8 max-w-7xl mx-auto">
        <header class="mb-16">
            <span class="bg-secondary-fixed text-on-secondary-fixed-variant px-3 py-1 rounded-md text-xs font-bold uppercase tracking-widest mb-4 inline-block">Info</span>
            <h1 class="text-3xl sm:text-5xl md:text-7xl font-headline font-extrabold text-primary tracking-tight mb-6">Verloren Voorwerpen</h1>
            <p class="text-lg text-on-surface-variant max-w-2xl leading-relaxed">Iets verloren op de scouts? Bekijk hier of je het kan terugvinden.</p>
        </header>
        <section class="bg-surface-container-low rounded-3xl p-6 md:p-12">
            <div id="verloren-voorwerpen-content" class="cms-editable space-y-8 max-w-3xl">
                <p class="text-on-surface-variant text-lg leading-relaxed">
                    Is je kleinste toch iets kwijtgespeeld? Vraag aan de leiding om samen eens in de kast van de verloren voorwerpen te kijken.
                </p>
                <div class="bg-surface-container rounded-2xl p-6 flex items-start gap-4">
                    <div class="w-10 h-10 rounded-full bg-tertiary-fixed flex items-center justify-center text-on-tertiary-fixed-variant shrink-0">
                        <span class="material-symbols-outlined text-lg">lightbulb</span>
                    </div>
                    <p class="text-on-surface-variant leading-relaxed">
                        <span class="font-bold text-primary">Tip:</span> Zet overal een naam in!
                    </p>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

<script src="/js/includes.js"></script>
</body>
</html>
