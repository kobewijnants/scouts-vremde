# .github/workflows/lint.yml
name: Lint & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Tailwind
        run: npm run build

      # Validate HTML
      - name: HTML Validation
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: dist/
          css: true

      # Lint CSS (optional if you have custom CSS beyond Tailwind)
      - name: Stylelint
        run: npx stylelint "src/**/*.css" --allow-empty-input
        continue-on-error: true

      # Check for broken links
      - name: Check links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress './dist/**/*.html'
          fail: true
