# .github/workflows/lint.yml
name: Lint & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: ./

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress './**/*.html'
          fail: true